syntax = "proto3";

package yellowstone;

// ---------------------------------------------------------------------------
// Stub Yellowstone / Dragon's Mouth proto.
// Replace with the official proto from:
//   https://github.com/rpcpool/yellowstone-grpc
// ---------------------------------------------------------------------------

service Geyser {
    // Bidirectional streaming subscription.
    rpc Subscribe(stream SubscribeRequest) returns (stream SubscribeUpdate);
}

message SubscribeRequest {
    // Slot subscriptions keyed by label.
    map<string, SubscribeRequestFilterSlots> slots = 1;
    // Account subscriptions keyed by label.
    map<string, SubscribeRequestFilterAccounts> accounts = 2;
    // Transaction subscriptions keyed by label.
    map<string, SubscribeRequestFilterTransactions> transactions = 3;
}

message SubscribeRequestFilterSlots {}

message SubscribeRequestFilterAccounts {
    repeated string account = 1;
    repeated string owner   = 2;
}

message SubscribeRequestFilterTransactions {
    optional bool vote               = 1;
    optional bool failed             = 2;
    repeated string account_include  = 3;
    repeated string account_exclude  = 4;
    repeated string account_required = 5;
}

message SubscribeUpdate {
    oneof update_oneof {
        SubscribeUpdateSlot         slot         = 1;
        SubscribeUpdateAccount      account      = 2;
        SubscribeUpdateTransaction  transaction  = 3;
    }
}

message SubscribeUpdateSlot {
    uint64 slot   = 1;
    uint64 parent = 2;
    string status = 3;
}

message SubscribeUpdateAccount {
    string pubkey  = 1;
    uint64 lamports = 2;
    string owner   = 3;
    bytes  data    = 4;
    uint64 slot    = 5;
}

message SubscribeUpdateTransaction {
    string signature = 1;
    uint64 slot      = 2;
    bool   is_vote   = 3;
}
